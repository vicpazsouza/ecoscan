<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EcoScan</title>

  <!-- Fonte bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url("fundocm.jpeg") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      width: 92%;
      max-width: 500px;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      text-align: center;
      backdrop-filter: blur(5px);
    }

    h1 {
      margin: 0;
      color: #2e7d32;
      font-size: 34px;
    }

    p {
      color: #555;
      font-size: 17px;
    }

    video {
      width: 100%;
      border-radius: 15px;
      margin-top: 20px;
    }

    .btn-primary {
      margin-top: 15px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #2e7d32;
      color: white;
      font-size: 17px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-primary:hover {
      background: #1b5e20;
      transform: scale(1.03);
    }

    .sugestao {
      margin-top: 15px;
      font-weight: 500;
      color: #333;
      font-size: 16px;
    }

    .opcoes {
      margin-top: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .opcoes button {
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #e8f5e9;
      cursor: pointer;
      transition: 0.2s;
      font-size: 15px;
    }

    .opcoes button:hover {
      background: #c8e6c9;
    }

    #resultado {
      margin-top: 18px;
      font-size: 16px;
      font-weight: 500;
      color: #222;
      white-space: pre-line;
    }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #888;
    }

    /* RESPONSIVIDADE */

    @media (max-width: 768px){

      .card{
        padding: 30px;
        border-radius: 25px;
      }

      h1{
        font-size: 38px;
      }

      p{
        font-size: 18px;
      }

      .btn-primary{
        padding: 16px;
        font-size: 18px;
      }

      #resultado{
        font-size: 17px;
      }

    }

  </style>

</head>

<body>

  <div class="container">
    <div class="card">

      <h1>♻️ EcoScan</h1>

      <p>Descubra como descartar corretamente</p>

      <video id="camera" autoplay></video>

      <button class="btn-primary" onclick="tirarFoto()">
        📸 Capturar
      </button>

      <button class="btn-primary" onclick="trocarCamera()">
        🔄 Trocar câmera
      </button>

      <canvas id="canvas" style="display:none;"></canvas>

      <div class="sugestao" id="sugestao"></div>

      <p id="resultado"></p>

      <div class="footer">
        Projeto de conscientização ambiental 🌱
      </div>

    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
